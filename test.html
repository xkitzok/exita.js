<!DOCTYPE html>
<html><body>
  <div id="app"></div>
  <script type="module">
    import { render, createElement, Fragment } from './dist/runtime.js';
    import App from './dist/App.exj.js';
    
    console.log('Runtime OK');
    console.log('App:', App);
    console.log('Type of App:', typeof App);
    
    if (typeof App === 'function') {
      try {
        const result = App();
        console.log('App() result:', result);
        const container = document.getElementById('app');
        if (container) {
          render(() => App(), container);
          console.log('Render done');
        }
      } catch(e) {
        console.error('Error calling App:', e);
      }
    } else {
      console.error('App is not a function');
    }
  </script>
</body></html>
